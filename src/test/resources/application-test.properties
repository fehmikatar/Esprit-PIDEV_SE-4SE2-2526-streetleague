# ──────────────────────────────────────────────────────
#  application-test.properties
#  Utilisé uniquement par les tests (@ActiveProfiles("test"))
# ──────────────────────────────────────────────────────

# BD H2 en mémoire (remplace MySQL pendant les tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# URL FastAPI (doit tourner sur :8000 pour les tests d'intégration)
ai.predict.url=http://localhost:8000/predict

# Désactiver la sécurité pendant les tests
spring.security.enabled=false
